<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>AI Proctor — Phone Camera</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --bg:#0b0b0b;--M:#8B004A;--Mglow:rgba(139,0,74,.35);
  --P:#F2EFE7;--P55:rgba(242,239,231,.55);
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--P);font-family:'DM Sans',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(242,239,231,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(242,239,231,.04) 1px,transparent 1px);
  background-size:40px 40px;}

/* ─── CAMERA CANVAS ───
   We use a canvas instead of <video> directly so we can:
   1. Always draw the frame upright (correcting device rotation)
   2. Feed the corrected frame to the TensorFlow model
   The hidden <video> captures the raw stream.
*/
#video{
  position:absolute;
  /* Hidden — we only use it as a source for canvas */
  width:1px;height:1px;opacity:0;pointer-events:none;
}
#cam-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  /* Mirror selfie cam horizontally for natural feel */
  transform:scaleX(-1);
}

/* ─── LAYOUT ─── */
#cam-wrap{position:fixed;inset:0;z-index:1;display:none;}
#cam-wrap.show{display:block;}

/* ─── HUD TOP ─── */
.hud-top{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:12px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.92),transparent);
  display:flex;align-items:center;justify-content:space-between;
}
.hud-title{font-family:'Orbitron',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;}
.hud-title span{color:var(--M);}
.hud-badge{
  font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:.12em;
  padding:4px 11px;border-radius:20px;
  border:1px solid rgba(34,197,94,.4);background:rgba(34,197,94,.09);
  color:var(--green);display:flex;align-items:center;gap:5px;
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── FACE RECT ─── */
#face-rect{
  position:absolute;
  top:12%;left:6%;right:6%;bottom:20%;
  border:2px solid var(--M);border-radius:14px;
  box-shadow:0 0 24px var(--Mglow);
  z-index:5;transition:border-color .25s,box-shadow .25s;
}
#face-rect.ok{border-color:var(--green);box-shadow:0 0 20px rgba(34,197,94,.35);}
#face-rect.danger{
  border-color:var(--red)!important;
  box-shadow:0 0 30px rgba(239,68,68,.6)!important;
  animation:fpulse .45s infinite alternate;
}
@keyframes fpulse{from{opacity:.65}to{opacity:1}}

/* Corner decorators */
.cb{position:absolute;width:24px;height:24px;border-color:var(--P55);border-style:solid;}
.cb.tl{top:-2px;left:-2px;border-width:2px 0 0 2px;border-radius:4px 0 0 0;}
.cb.tr{top:-2px;right:-2px;border-width:2px 2px 0 0;border-radius:0 4px 0 0;}
.cb.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px;border-radius:0 0 0 4px;}
.cb.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0;border-radius:0 0 4px 0;}

/* Scanline */
.scanline{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(139,0,74,.7),transparent);
  opacity:0;z-index:6;animation:scan 3s linear infinite;
}
@keyframes scan{0%{top:0;opacity:0}4%{opacity:.5}96%{opacity:.5}100%{top:100%;opacity:0}}

/* ─── HUD BOTTOM ─── */
.hud-bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:14px 18px 30px;
  background:linear-gradient(0deg,rgba(0,0,0,.94),transparent);
}
.pred-label{
  font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;
  letter-spacing:.08em;text-align:center;margin-bottom:8px;min-height:26px;
  transition:color .22s;color:var(--P55);
}
.conf-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:11px;}
.conf-bar{height:100%;border-radius:3px;width:0%;transition:width .4s,background .25s;}
.chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.chip{
  display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;
  border:1px solid rgba(242,239,231,.07);background:rgba(255,255,255,.025);
  font-size:.56rem;letter-spacing:.04em;color:rgba(242,239,231,.3);
}
.chip.lit{color:var(--P);border-color:rgba(242,239,231,.15);}
.cd{width:5px;height:5px;border-radius:50%;}
.cd.g{background:var(--green);}.cd.a{background:var(--amber);}.cd.r{background:var(--red);}

/* ─── LOADING SCREEN ─── */
#loading-screen{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:28px;text-align:center;
}
.logo-ring{
  width:54px;height:54px;border-radius:50%;
  border:1px solid rgba(242,239,231,.3);
  display:flex;align-items:center;justify-content:center;
  position:relative;box-shadow:0 0 22px var(--Mglow);
}
.logo-ring::after{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  border:1px solid transparent;border-top-color:var(--M);
  animation:spin 3s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.1em;}
.load-row{
  font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:.1em;
  padding:8px 16px;border-radius:6px;
  border:1px solid rgba(242,239,231,.08);
  color:rgba(242,239,231,.28);background:rgba(255,255,255,.02);
  min-width:240px;text-align:center;transition:all .3s;
}
.load-row.ok  {color:var(--green);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05);}
.load-row.err {color:var(--red);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04);}
.load-row.wait{color:var(--amber);border-color:rgba(245,158,11,.3);}

/* ─── ERROR SCREEN ─── */
#error-screen{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:28px;text-align:center;
}
#error-screen.show{display:flex;}
.err-icon{font-size:2.6rem;}
.err-title{font-family:'Orbitron',sans-serif;font-size:.8rem;letter-spacing:.1em;color:var(--red);}
.err-msg{font-size:.68rem;color:rgba(242,239,231,.42);line-height:1.75;max-width:290px;white-space:pre-line;}
.btn-retry{
  padding:11px 26px;border:1px solid rgba(139,0,74,.5);border-radius:8px;
  background:linear-gradient(135deg,rgba(139,0,74,.2),rgba(139,0,74,.05));
  color:var(--P);font-family:'Orbitron',sans-serif;font-size:.6rem;
  font-weight:700;letter-spacing:.1em;cursor:pointer;margin-top:4px;transition:all .2s;
}
</style>
</head>
<body>

<!-- ─── LOADING ─── -->
<div id="loading-screen">
  <div class="logo-ring">
    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="11" stroke="#F2EFE7" stroke-width="1.4" opacity=".6"/>
      <circle cx="14" cy="14" r="3" fill="#F2EFE7" opacity=".9"/>
      <circle cx="14" cy="14" r="1.2" fill="#8B004A"/>
    </svg>
  </div>
  <div class="load-title">AI Exam <span style="color:#8B004A">Proctor</span></div>
  <div class="load-row" id="ls-peer">⏳ CONNECTING TO PC…</div>
  <div class="load-row" id="ls-model">⏳ LOADING AI MODEL…</div>
  <div class="load-row" id="ls-cam">⏳ STARTING CAMERA…</div>
</div>

<!-- ─── ERROR ─── -->
<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">SETUP ERROR</div>
  <div class="err-msg" id="err-msg">Something went wrong.</div>
  <button class="btn-retry" onclick="location.reload()">↺ Retry</button>
</div>

<!-- ─── CAMERA VIEW ─── -->
<div id="cam-wrap">
  <!-- Hidden video source -->
  <video id="video" autoplay muted playsinline></video>

  <!-- Canvas — receives corrected (upright) frames for display + model -->
  <canvas id="cam-canvas"></canvas>

  <!-- Hidden prediction canvas — fed into TensorFlow (224×224) -->
  <canvas id="pred-canvas" width="224" height="224" style="display:none;"></canvas>

  <div class="scanline"></div>

  <div id="face-rect">
    <b class="cb tl"></b><b class="cb tr"></b><b class="cb bl"></b><b class="cb br"></b>
  </div>

  <div class="hud-top">
    <div class="hud-title">AI Exam <span>Proctor</span></div>
    <div class="hud-badge"><span class="ldot"></span>LIVE · SENDING</div>
  </div>

  <div class="hud-bottom">
    <div class="pred-label" id="pred-label">🔍 SCANNING…</div>
    <div class="conf-bar-wrap"><div class="conf-bar" id="conf-bar"></div></div>
    <div class="chips">
      <div class="chip lit" id="chip-peer"><i class="cd g"></i>PC Connected</div>
      <div class="chip lit" id="chip-model"><i class="cd g"></i>Model OK</div>
      <div class="chip lit" id="chip-cam"><i class="cd g"></i>Camera</div>
      <div class="chip" id="chip-pred"><i class="cd a"></i>Conf: —</div>
      <div class="chip" id="chip-orient"><i class="cd g"></i>Portrait</div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ─── URL PARAMS ─── */
const params     = new URLSearchParams(window.location.search);
const PC_PEER_ID = params.get('pid') || '';

const g = id => document.getElementById(id);

/* ─── SAME CONSTANTS AS exam.html ─── */
const SMOOTHING_FRAMES    = 3;    // consecutive same-label frames needed
const CONFIDENCE_THRESHOLD= 75;   // minimum confidence % to count
const PHONE_MIN_CONF      = 0.90; // phone must be ≥90% confident
const PHONE_GAP_MIN       = 0.30; // phone must be 30% above distracted

/* ─── STATE ─── */
let phonePeer  = null;
let pcConn     = null;
let tmModel    = null;
let videoEl    = null;
let displayCanvas = null;  // full-screen display canvas
let predCanvas    = null;  // 224×224 prediction canvas
let displayCtx    = null;
let predCtx       = null;
let labelBuffer   = [];    // temporal smoothing buffer (same as PC)
let deviceAngle   = 0;     // current device orientation angle

/* ─── HELPERS ─── */
function setRow(id, state, msg){
  const el = g(id);
  el.textContent = msg;
  el.className = 'load-row' + (state ? ' '+state : '');
}
function showErr(msg){
  g('loading-screen').style.display = 'none';
  g('error-screen').classList.add('show');
  g('err-msg').textContent = msg;
}

/* ─────────────────────────────────────────
   STEP 1: CONNECT TO PC VIA PEERJS
───────────────────────────────────────── */
function connectToPeer(){
  if(!PC_PEER_ID){
    showErr('No PC Peer ID found.\nPlease scan the QR code again from the exam page.');
    return;
  }
  setRow('ls-peer','wait','⏳ Connecting to PC…');
  phonePeer = new Peer({ debug:0 });

  phonePeer.on('open', ()=>{
    const conn = phonePeer.connect(PC_PEER_ID, { reliable:true, serialization:'json' });
    pcConn = conn;

    conn.on('open', ()=>{
      setRow('ls-peer','ok','✅ PC CONNECTED');
      // Load model + camera in parallel after connection
      Promise.all([loadModel(), startCamera()]).then(([mOk, cOk])=>{
        if(mOk && cOk) launchCamera();
      });
    });

    conn.on('data', data=>{
      // PC can send commands (start/stop)
      if(data && data.cmd === 'stop') labelBuffer = [];
    });

    conn.on('close', ()=>{
      g('chip-peer').innerHTML = '<i class="cd r"></i>PC Disconnected';
    });
    conn.on('error', e=>{
      showErr('Connection error.\nReopen QR popup on PC and scan again.');
    });
  });

  phonePeer.on('error', e=>{
    setRow('ls-peer','err','✗ ' + e.type.toUpperCase());
    if(e.type === 'peer-unavailable'){
      showErr('Cannot find PC.\n\n1. Keep exam.html open on PC\n2. Click "📱 Get Camera" again\n3. Scan the NEW QR code');
    } else {
      showErr('PeerJS error: ' + e.type + '\n\nTry reloading this page.');
    }
  });
}

/* ─────────────────────────────────────────
   STEP 2: LOAD TEACHABLE MACHINE MODEL
───────────────────────────────────────── */
async function loadModel(){
  setRow('ls-model','wait','⏳ Loading AI model…');
  try{
    tmModel = await tmImage.load('model/model.json','model/metadata.json');
    const labels = tmModel.getClassLabels ? tmModel.getClassLabels() : [];
    setRow('ls-model','ok','✅ MODEL: ' + labels.join(' / '));
    return true;
  } catch(e){
    setRow('ls-model','err','✗ MODEL: ' + e.message);
    showErr('Cannot load AI model.\nEnsure model/ folder is in the same directory as phone-cam.html on GitHub Pages.');
    return false;
  }
}

/* ─────────────────────────────────────────
   STEP 3: START PHONE CAMERA
   Request portrait-optimised stream.
   We handle rotation ourselves via canvas.
───────────────────────────────────────── */
async function startCamera(){
  setRow('ls-cam','wait','⏳ Starting camera…');
  try{
    // Lock to portrait via Screen Orientation API (if supported)
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('portrait').catch(()=>{});
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode: 'user',
        width:  { ideal: 480 },
        height: { ideal: 640 }
      },
      audio: false
    });

    videoEl = g('video');
    videoEl.srcObject = stream;
    await new Promise(r => { videoEl.onloadedmetadata = r; });
    await videoEl.play();
    setRow('ls-cam','ok','✅ CAMERA ACTIVE');
    return true;
  } catch(e){
    setRow('ls-cam','err','✗ CAMERA: ' + e.message);
    showErr('Camera access denied.\nAllow camera permission in browser settings and reload.');
    return false;
  }
}

/* ─────────────────────────────────────────
   ORIENTATION TRACKING
   Detect device tilt and apply inverse rotation
   to canvas so the model always sees an upright face.
───────────────────────────────────────── */
function getOrientationAngle(){
  // screen.orientation.angle is most reliable
  if(screen.orientation) return screen.orientation.angle || 0;
  // fallback: window.orientation (deprecated but still works on many phones)
  return window.orientation || 0;
}

function listenOrientation(){
  const update = ()=>{
    deviceAngle = getOrientationAngle();
    const chip = g('chip-orient');
    if(deviceAngle === 0 || deviceAngle === 180){
      chip.innerHTML = '<i class="cd g"></i>Portrait ✓';
    } else {
      chip.innerHTML = '<i class="cd a"></i>Landscape — rotate phone ↑';
    }
  };
  window.addEventListener('orientationchange', ()=>{ setTimeout(update, 300); });
  screen.orientation && screen.orientation.addEventListener('change', update);
  update();
}

/* ─────────────────────────────────────────
   CANVAS RENDER LOOP
   Draws every video frame onto the display canvas
   with orientation correction applied.
   Also draws the corrected frame onto the hidden
   224×224 pred-canvas that the model reads from.
───────────────────────────────────────── */
function startCanvasLoop(){
  displayCanvas = g('cam-canvas');
  predCanvas    = g('pred-canvas');
  displayCtx    = displayCanvas.getContext('2d');
  predCtx       = predCanvas.getContext('2d');

  function resizeDisplay(){
    displayCanvas.width  = window.innerWidth;
    displayCanvas.height = window.innerHeight;
  }
  resizeDisplay();
  window.addEventListener('resize', resizeDisplay);

  function drawFrame(){
    requestAnimationFrame(drawFrame);
    if(!videoEl || videoEl.readyState < 2 || !videoEl.videoWidth) return;

    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    const dw = displayCanvas.width;
    const dh = displayCanvas.height;
    const angle = deviceAngle;

    /* ── Draw onto DISPLAY canvas (full-screen) ── */
    displayCtx.save();
    displayCtx.clearRect(0, 0, dw, dh);

    if(angle === 90 || angle === -270){
      // Landscape-right: rotate -90°
      displayCtx.translate(dw/2, dh/2);
      displayCtx.rotate(-Math.PI/2);
      const scale = Math.max(dw/vh, dh/vw);
      displayCtx.drawImage(videoEl, -vh*scale/2, -vw*scale/2, vh*scale, vw*scale);
    } else if(angle === -90 || angle === 270){
      // Landscape-left: rotate +90°
      displayCtx.translate(dw/2, dh/2);
      displayCtx.rotate(Math.PI/2);
      const scale = Math.max(dw/vh, dh/vw);
      displayCtx.drawImage(videoEl, -vh*scale/2, -vw*scale/2, vh*scale, vw*scale);
    } else if(angle === 180){
      // Upside-down portrait: rotate 180°
      displayCtx.translate(dw/2, dh/2);
      displayCtx.rotate(Math.PI);
      const scale = Math.max(dw/vw, dh/vh);
      displayCtx.drawImage(videoEl, -vw*scale/2, -vh*scale/2, vw*scale, vh*scale);
    } else {
      // Normal portrait — no rotation needed
      const scale = Math.max(dw/vw, dh/vh);
      displayCtx.translate(dw/2, dh/2);
      displayCtx.drawImage(videoEl, -vw*scale/2, -vh*scale/2, vw*scale, vh*scale);
    }
    displayCtx.restore();

    /* ── Draw onto PREDICTION canvas (224×224, always upright) ── */
    predCtx.save();
    predCtx.clearRect(0, 0, 224, 224);

    if(angle === 90 || angle === -270){
      predCtx.translate(112, 112);
      predCtx.rotate(-Math.PI/2);
      predCtx.drawImage(videoEl, -112, -112, 224, 224);
    } else if(angle === -90 || angle === 270){
      predCtx.translate(112, 112);
      predCtx.rotate(Math.PI/2);
      predCtx.drawImage(videoEl, -112, -112, 224, 224);
    } else if(angle === 180){
      predCtx.translate(112, 112);
      predCtx.rotate(Math.PI);
      predCtx.drawImage(videoEl, -112, -112, 224, 224);
    } else {
      predCtx.drawImage(videoEl, 0, 0, 224, 224);
    }
    predCtx.restore();
  }

  drawFrame();
}

/* ─────────────────────────────────────────
   PREDICTION LOOP
   Reads from pred-canvas (always upright).
   Applies SAME smoothing + gap check as exam.html.
   Sends stable predictions to PC via PeerJS.
───────────────────────────────────────── */
function startPredictionLoop(){
  labelBuffer = [];

  setInterval(async ()=>{
    if(!tmModel || !predCanvas || !pcConn || !pcConn.open) return;
    if(!videoEl || videoEl.readyState < 2) return;

    try{
      // Predict from the orientation-corrected 224×224 canvas
      const preds = await tmModel.predict(predCanvas);

      /* ── Extract per-class probabilities ── */
      let focusedProb = 0, distractedProb = 0, phoneProb = 0;
      preds.forEach(p => {
        const lbl = (p.className || '').trim().toLowerCase();
        if(lbl === 'focused')          focusedProb    = p.probability;
        else if(lbl === 'distracted')  distractedProb = p.probability;
        else if(lbl === 'using phone') phoneProb      = p.probability;
      });

      const top     = preds.reduce((a,b) => a.probability > b.probability ? a : b);
      const confNum = parseFloat((top.probability * 100).toFixed(1));

      /* ── Phone gap check (same threshold as exam.html) ── */
      const phoneIsReal = phoneProb >= PHONE_MIN_CONF
                       && (phoneProb - distractedProb) >= PHONE_GAP_MIN;

      let effectiveLabel;
      if(focusedProb >= distractedProb && focusedProb >= phoneProb){
        effectiveLabel = 'focused';
      } else if(phoneIsReal){
        effectiveLabel = 'using phone';
      } else {
        effectiveLabel = 'distracted';
      }

      /* ── Temporal smoothing (same 3-frame buffer as exam.html) ── */
      if(confNum >= CONFIDENCE_THRESHOLD){
        labelBuffer.push(effectiveLabel);
      } else {
        labelBuffer.push('uncertain');
      }
      if(labelBuffer.length > SMOOTHING_FRAMES) labelBuffer.shift();

      const allSame    = labelBuffer.length === SMOOTHING_FRAMES
                      && labelBuffer.every(l => l === labelBuffer[0]);
      const stableLabel = allSame ? labelBuffer[0] : null;

      /* ── Update phone UI (always, for visual feedback) ── */
      updateUI(effectiveLabel, confNum, stableLabel);

      /* ── Send to PC only when we have a stable label ──
         This matches exactly what exam.html does locally.
         PC's handlePrediction() will do its own buffer check too,
         but since phone already smoothed it, PC will confirm fast.
      */
      if(stableLabel && stableLabel !== 'uncertain'){
        // Build fake preds array that PC's handlePrediction() can read
        // Inject the stable label as 99% confident so PC confirms immediately
        const fakePreds = preds.map(p => {
          const lbl = (p.className||'').trim().toLowerCase();
          if(lbl === stableLabel){
            return { className: p.className, probability: 0.98 };
          } else {
            return { className: p.className, probability: (1 - 0.98) / (preds.length - 1) };
          }
        });
        pcConn.send({ preds: fakePreds });
      }

    } catch(e){ console.warn('Pred error:', e); }

  }, 500); // 500ms — same as PC's prediction interval
}

/* ─────────────────────────────────────────
   PHONE UI UPDATE
───────────────────────────────────────── */
function updateUI(effectiveLabel, conf, stableLabel){
  const pr   = g('pred-label');
  const cb   = g('conf-bar');
  const fr   = g('face-rect');
  const chip = g('chip-pred');

  // Use stable label for display if available, else effective
  const displayLabel = stableLabel || effectiveLabel;

  if(conf >= CONFIDENCE_THRESHOLD){
    fr.classList.remove('ok','danger');
    if(displayLabel === 'focused'){
      pr.textContent  = '✓ FOCUSED';
      pr.style.color  = 'var(--green)';
      fr.classList.add('ok');
    } else if(displayLabel === 'using phone'){
      pr.textContent  = '📱 PHONE DETECTED';
      pr.style.color  = 'var(--red)';
      fr.classList.add('danger');
    } else {
      pr.textContent  = '⚠ DISTRACTED';
      pr.style.color  = 'var(--amber)';
      fr.classList.add('danger');
    }
    // Show "verifying…" while buffer is building
    if(!stableLabel && displayLabel !== 'focused'){
      pr.textContent += ' (verifying…)';
    }
  } else {
    pr.textContent = '🔍 SCANNING…';
    pr.style.color = 'rgba(242,239,231,.35)';
    fr.classList.remove('ok','danger');
  }

  cb.style.width      = conf + '%';
  cb.style.background = conf > 75 ? '#22c55e' : conf > 50 ? '#f59e0b' : '#ef4444';
  chip.innerHTML      = '<i class="cd ' + (conf>75?'g':conf>50?'a':'r') + '"></i>Conf: ' + conf + '%';
  chip.classList.add('lit');
}

/* ─────────────────────────────────────────
   LAUNCH EVERYTHING ONCE CONNECTED + READY
───────────────────────────────────────── */
function launchCamera(){
  g('loading-screen').style.display = 'none';
  g('cam-wrap').classList.add('show');

  listenOrientation();
  startCanvasLoop();
  startPredictionLoop();
}

/* ─────────────────────────────────────────
   BOOT
───────────────────────────────────────── */
connectToPeer();

// Prevent screen sleep on mobile (Wake Lock API)
async function keepAwake(){
  if('wakeLock' in navigator){
    try{ await navigator.wakeLock.request('screen'); }catch(e){}
  }
}
keepAwake();
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') keepAwake();
});
document.addEventListener('touchstart', ()=>{}, { passive:true });
</script>
